    // === Print original data to the DOM ===

    function generateInventorsTable(data, table_id, table_classes) {
      const table = document.createElement('table');
      table.setAttribute('id', table_id);
      table.setAttribute('class', table_classes);

      // Create Header
      const header = table.createTHead();
      table.appendChild(header);
      const headerRow = header.insertRow();
      Object.keys(data[0]).forEach(key => {
        const th = document.createElement('th');
        th.textContent = key.toUpperCase();
        headerRow.appendChild(th);
      });

      // Create Body
      const tbody = table.createTBody();
      table.appendChild(tbody);
      data.forEach(item => {
        const row = tbody.insertRow();
        Object.values(item).forEach(val => {
          const cell = row.insertCell();
          cell.textContent = val;
        });
      });

      return table;
    }

    function generatePeopleTable(data, table_id, table_classes) {
      const table = document.createElement('table');
      table.setAttribute('id', table_id);
      table.setAttribute('class', table_classes);

      // Create Header
      const header = table.createTHead();
      table.appendChild(header);
      const headerRow = header.insertRow();
      Object.keys(data[0].split(",")).forEach(key => {
        const th = document.createElement('th');
        th.textContent = key.toUpperCase();
        headerRow.appendChild(th);
      });

      // Create Body
      const tbody = table.createTBody();
      table.appendChild(tbody);
      data.forEach(item => {
        const row = tbody.insertRow();
        Object.values(item.split(",")).forEach(val => {
          const cell = row.insertCell();
          cell.textContent = val;
        });
      });

      return table;
    }

    var tablesBeforeEdits = document.getElementById('original-data');
    tablesBeforeEdits.appendChild(generateInventorsTable(inventors, 'original-inventors', 'inventors'));
    tablesBeforeEdits.appendChild(generatePeopleTable(people, 'original-people', 'people'));

    // Array.prototype.filter()
    // 1. Filter the list of inventors for those who were born in the 1500's
    var editedTable = document.getElementById('data-1');
    var filteredInventors = inventors.filter(inventor => inventor.year >= 1500 && inventor.year < 1600);
    editedTable.appendChild(generateInventorsTable(filteredInventors, 'filtered-inventors', 'inventors filtered'));

    // Array.prototype.map()
    // 2. Give us an array of the inventors first and last names
    editedTable = document.getElementById('data-2');
    filteredInventors = inventors.map((item) => { return {first: item.first, last: item.last};});
    editedTable.appendChild(generateInventorsTable(filteredInventors, 'inventors-first-last', 'inventors filtered first-last'));

    // Array.prototype.sort()
    // 3. Sort the inventors by birthdate, oldest to youngest
    editedTable = document.getElementById('data-3');
    sortedInventors = inventors.sort((x, y) => { return x.year - y.year;});
    editedTable.appendChild(generateInventorsTable(sortedInventors, 'inventors-sorted-birth', 'inventors sorted birth'));
