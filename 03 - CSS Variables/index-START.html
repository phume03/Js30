<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoped CSS Variables and JS</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>
  <h2>Update CSS Variables with <span class='hl'>JS</span></h2>

  <div class="controls">
    <label for="spacing">Spacing:</label>
    <input id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">

    <label for="blur">Blur:</label>
    <input id="blur" type="range" name="blur" min="0" max="25" value="10" data-sizing="px">

    <label for="base">Base Color</label>
    <input id="base" type="color" name="base" value="#ffc600">
  </div>

  <img src="./BREAK.png" width="500px">

  <style>
    /*
    CSS variables can have a global or local scope. Global variables can be accessed through the entire 
    document, while local variables can be used only inside the selector where it is declared. To create 
    a global variable, declare it inside the :root selector. The :root selector matches the document's 
    root element. To create a local variable, declare it inside the selector that is going to use it. A 
    CSS variable name must begin with two dashes (--) and is case sensitive!
    */

    :root {
      --primary-base-color: #ffc600; /* global scope */
      --image-border-spacing: 10px;
      --image-blur: 10px; 
    }

    /*
      misc styles, nothing to do with CSS variables
    */

    body {
      text-align: center;
      background: #193549;
      color: white;
      font-family: 'helvetica neue', sans-serif;
      font-weight: 100;
      font-size: 50px;
    }

    .controls {
      margin-bottom: 50px;
    }

    input {
      width: 100px;
    }

    img {
      border: 10px var(--primary-base-color) solid;
      padding: var(--image-border-spacing);
      filter: blur(var(--image-blur)px);
      -webkit-filter: blur(var(--image-blur));
    }

  </style>

  <script>
    // Get the root element
    var r = document.querySelector(':root');
    // var rs = getComputedStyle(r);
    // rs.getPropertyValue('--primary-base-color');
    // r.style.setProperty('--primary-base-color', 'green');

    // on change breaks the DOM, oninput preferred. Final changes some text css, i don't.

    var imageBase = document.getElementById("base");
    imageBase.oninput = function() {
      r.style.setProperty('--primary-base-color', imageBase.value);
    };    

    var imageSpace = document.getElementById("spacing");
    imageSpace.oninput = function() {
      r.style.setProperty('--image-border-spacing', imageSpace.value + imageSpace.dataset.sizing);
    };

    var imageBlur = document.getElementById("blur");
    imageBlur.oninput = function() {
      r.style.setProperty('--image-blur', imageBlur.value + imageBlur.dataset.sizing);
    };


  </script>

</body>
</html>
